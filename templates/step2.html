<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Комп - Крок 2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">

        <h1>Крок 2: Оберіть клавіатуру</h1>

        <form method="POST" action="{{ url_for('step2') }}">
            <div class="options-grid">
                {% for arl in arls %}
                    <label class="option-card">
                        {# radio buttons мають однакове ім'я (name) для групи,
                           а значення (value) - це ID інгредієнта.
                           Додано 'checked' для збереження попереднього вибору #}
                        <input type="radio" name="arl" value="{{ arl.id }}"
                               {% if selected_arl_id and selected_arl_id == arl.id %}checked{% endif %} required>
                        <div class="card-content">
                            <img src="{{ url_for('static', filename=arl.image) }}" alt="{{ arl.name }}" class="option-image">
                            <h3>{{ arl.name }}</h3>
                            <p class="price">${{ "%.2f"|format(arl.price) }}</p>
                        </div>
                    </label>
                {% endfor %}
            </div>
             <a href="{{ url_for('step1') }}" class="btn btn-secondary">Назад</a>
            <button type="submit" class="btn btn-primary">Далі</button>
        </form>
    </div>
</body>
</html>
